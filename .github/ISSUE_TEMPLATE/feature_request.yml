name: ✨ Feature Request
description: Suggest a new rule, output format, or workflow improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or missing feature are you running into?
      placeholder: "I wish ansede-static could detect..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other tools you've tried?
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New detection rule
        - Fewer false positives
        - New output format
        - CLI / workflow
        - Performance
        - Documentation
        - Other
    validations:
      required: true
