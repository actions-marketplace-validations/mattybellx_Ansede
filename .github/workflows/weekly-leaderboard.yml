name: Weekly 3-Tool SAST Leaderboard

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 06:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install tools
        run: |
          pip install ansede-static semgrep
          # CodeQL
          wget -q https://github.com/github/codeql-action/releases/latest/download/codeql-bundle-linux64.tar.gz
          tar xzf codeql-bundle-linux64.tar.gz
          echo "$PWD/codeql" >> $GITHUB_PATH
      
      - name: Run 3-tool comparison
        run: |
          python benchmarks/one_click_compare.py --output benchmarks/report --repos-only
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: benchmarks/report
          destination_dir: leaderboard
          keep_files: true
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: leaderboard-results
          path: benchmarks/report/results.json
