name: Top-repo batch scan

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansede-static
        run: pip install -e ".[dev]"

      - name: Run batch scan on campaign targets (sample slice)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tools/batch_scan_repos.py \
            --repos-file benchmarks/campaign_targets_top100.json \
            --limit 25 \
            --max-files-per-repo 1500 \
            --js-backend structural \
            --with-audit \
            --output .tmp/batch_scan_latest.json \
            --quiet

      - name: Generate markdown summary
        run: |
          python tools/summarize_batch_scan_report.py \
            --input .tmp/batch_scan_latest.json \
            --output .tmp/batch_scan_latest.md

      - name: Upload batch scan report artifact
        uses: actions/upload-artifact@v4
        with:
          name: batch-scan-report
          path: |
            .tmp/batch_scan_latest.json
            .tmp/batch_scan_latest.md
